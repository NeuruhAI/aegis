      requires_idempotency_key: true
    capabilities:
      read_pii: false
      network_egress: []
      cost_per_invocation_usd: 0.00005
      latency_p99_ms: 15
      compliance_scopes: [soc2_cc7.2]
      destructive: false
    sovereignty:
      runs_on: [edge, local, managed]
      data_residency: [user_device, tailnet]
      air_gap_capable: true

  ffdb:
    layer: L1
    version: 0.1.0
    repo: https://github.com/NeuruhAI/core-node-ffdb
    depends_on: [ether-layer]
    status: scaffolded
    contract:
      invoke_input: contracts/ffdb-invoke-in@0.1.0.schema.json
      invoke_output: contracts/ffdb-invoke-out@0.1.0.schema.json
      requires_idempotency_key: true
    capabilities:
      read_pii: true
      network_egress: [supabase.co, tailnet]
      cost_per_invocation_usd: 0.0002
      latency_p99_ms: 80
      compliance_scopes: [soc2_cc6.1, soc2_cc6.7, soc2_cc7.2]
      destructive: false
    sovereignty:
      runs_on: [local, managed]
      data_residency: [tailnet, supabase_us_east_1]
      air_gap_capable: true

