# Atomic Node Registry
# Every node MUST declare capabilities, sovereignty, and artifact_sha256 once built.

nodes:
  ether-layer:
    layer: L0
    version: 0.1.0
    repo: https://github.com/NeuruhAI/neuruh-ether-layer
    depends_on: []
    status: scaffolded
    contract:
      invoke_input: contracts/ether-layer-invoke-in@0.1.0.schema.json
      invoke_output: contracts/ether-layer-invoke-out@0.1.0.schema.json
      requires_idempotency_key: true
    capabilities:
      read_pii: false
      network_egress: [tailnet, supabase.co]
      cost_per_invocation_usd: 0.0001
      latency_p99_ms: 60
      compliance_scopes: [soc2_cc7.2, soc2_cc8.1]
      destructive: false
    sovereignty:
      runs_on: [edge, local, managed]
      data_residency: [user_device, tailnet, supabase_us_east_1]
      air_gap_capable: true

  gray-code-state:
    layer: L1
    version: 0.1.0
    repo: https://github.com/NeuruhAI/core-node-gray-code
    depends_on: [ether-layer]
    status: scaffolded
    contract:
      invoke_input: contracts/gray-code-invoke-in@0.1.0.schema.json
